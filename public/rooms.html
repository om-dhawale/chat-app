<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relay — Rooms</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #0f0f0f;
        color: #f0f0f0;
        min-height: 100vh;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.1rem 2rem;
        border-bottom: 1px solid #1e1e1e;
        background: #0f0f0f;
        position: sticky;
        top: 0;
        z-index: 10;
      }

      header h1 {
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .logout-btn {
        font-size: 0.8rem;
        color: #555;
        background: none;
        border: 1px solid #272727;
        border-radius: 6px;
        padding: 0.35rem 0.75rem;
        cursor: pointer;
        font-family: inherit;
        transition:
          color 0.15s,
          border-color 0.15s;
      }

      .logout-btn:hover {
        color: #f87171;
        border-color: #f87171;
      }

      .main {
        max-width: 600px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }

      .section-label {
        font-size: 0.75rem;
        font-weight: 500;
        color: #555;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 0.75rem;
      }

      .create-area {
        display: flex;
        gap: 0.6rem;
        margin-bottom: 2.5rem;
      }

      input {
        flex: 1;
        padding: 0.65rem 0.85rem;
        background: #171717;
        border: 1px solid #272727;
        border-radius: 8px;
        color: #f0f0f0;
        font-size: 0.9rem;
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s;
      }

      input:focus {
        border-color: #4f46e5;
      }
      input::placeholder {
        color: #3a3a3a;
      }

      .btn {
        padding: 0.65rem 1.1rem;
        background: #4f46e5;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 0.88rem;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.15s;
      }

      .btn:hover {
        background: #4338ca;
      }

      #roomsList {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .room {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #171717;
        border: 1px solid #1e1e1e;
        border-radius: 10px;
        padding: 1rem 1.25rem;
        cursor: pointer;
        transition:
          border-color 0.15s,
          background 0.15s;
      }

      .room:hover {
        background: #1e1e1e;
        border-color: #2e2e2e;
      }

      .room-name {
        font-size: 0.95rem;
        font-weight: 500;
        color: #e0e0e0;
      }

      .room-arrow {
        color: #333;
        font-size: 1.1rem;
        transition: color 0.15s;
      }

      .room:hover .room-arrow {
        color: #4f46e5;
      }

      .empty {
        text-align: center;
        color: #333;
        font-size: 0.9rem;
        padding: 3rem 0;
      }

      .delete-btn {
        background: none;
        border: 1px solid #3a3a3a;
        color: #555;
        font-size: 0.78rem;
        padding: 0.3rem 0.65rem;
        border-radius: 6px;
        cursor: pointer;
        font-family: inherit;
        transition:
          color 0.15s,
          border-color 0.15s;
      }

      .delete-btn:hover {
        color: #f87171;
        border-color: #f87171;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Relay</h1>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </header>
    <div class="main">
      <p class="section-label">Create a room</p>
      <div class="create-area">
        <input type="text" id="roomName" placeholder="Room name" />
        <button class="btn" onclick="createRoom()">Create</button>
      </div>
      <p class="section-label">All rooms</p>
      <div id="roomsList"></div>
    </div>
    <script src="rooms.js"></script>
  </body>
</html>
