<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relay — Chat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0f0f0f;
    color: #f0f0f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wrapper {
    width: 100%;
    max-width: 400px;
    padding: 1.5rem;
  }

  .brand {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .brand h1 {
    font-size: 1.75rem;
    font-weight: 600;
    letter-spacing: -0.03em;
    color: #fff;
  }

  .brand p {
    font-size: 0.85rem;
    color: #555;
    margin-top: 0.35rem;
  }

  .card {
    background: #171717;
    border: 1px solid #272727;
    border-radius: 12px;
    padding: 2rem;
  }

  .tabs {
    display: flex;
    gap: 0.25rem;
    background: #0f0f0f;
    border-radius: 8px;
    padding: 0.25rem;
    margin-bottom: 1.75rem;
  }

  .tab {
    flex: 1;
    padding: 0.5rem;
    text-align: center;
    font-size: 0.85rem;
    font-weight: 500;
    color: #555;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .tab.active {
    background: #272727;
    color: #f0f0f0;
  }

  .form-group {
    margin-bottom: 1rem;
  }

  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 500;
    color: #888;
    margin-bottom: 0.4rem;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  input {
    width: 100%;
    padding: 0.65rem 0.85rem;
    background: #0f0f0f;
    border: 1px solid #272727;
    border-radius: 8px;
    color: #f0f0f0;
    font-size: 0.9rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus {
    border-color: #4f46e5;
  }

  input::placeholder { color: #3a3a3a; }

  .btn {
    width: 100%;
    padding: 0.7rem;
    margin-top: 0.5rem;
    background: #4f46e5;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn:hover { background: #4338ca; }

  .error {
    font-size: 0.8rem;
    color: #f87171;
    margin-top: 0.75rem;
    text-align: center;
    min-height: 1.1rem;
  }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="brand">
    <h1>Relay</h1>
    <p>Real-time rooms for your team</p>
  </div>
  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="showTab('login')">Sign in</div>
      <div class="tab" onclick="showTab('register')">Register</div>
    </div>

    <div id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <button class="btn" onclick="login()">Sign in</button>
    </div>

    <div id="registerForm" class="hidden">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="registerUsername" placeholder="yourname" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="registerEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="registerPassword" placeholder="••••••••" />
      </div>
      <button class="btn" onclick="register()">Create account</button>
    </div>

    <div class="error" id="errorMsg"></div>
  </div>
</div>

<script src="index.js"></script>
<script>
  function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab')[tab === 'login' ? 0 : 1].classList.add('active');
    document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
    document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
    document.getElementById('errorMsg').textContent = '';
  }
</script>
</body>
</html>
