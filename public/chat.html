<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relay — Chat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0f0f0f;
    color: #f0f0f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    gap: 0.85rem;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid #1e1e1e;
    background: #0f0f0f;
  }

  .back-btn {
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 1.1rem;
    padding: 0.2rem 0.4rem;
    border-radius: 4px;
    transition: color 0.15s;
    font-family: inherit;
  }

  .back-btn:hover { color: #f0f0f0; }

  .room-title {
    font-size: 1rem;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.01em;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }

  .message {
    max-width: 68%;
    padding: 0.6rem 0.9rem;
    border-radius: 12px;
    font-size: 0.9rem;
    line-height: 1.45;
    word-break: break-word;
  }

  .message.mine {
    background: #4f46e5;
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .message.theirs {
    background: #1e1e1e;
    color: #e0e0e0;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  .sender {
    font-size: 0.7rem;
    font-weight: 500;
    color: #555;
    margin-bottom: 0.2rem;
  }

  .message.mine .sender { text-align: right; color: #a5b4fc; }

  .input-area {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 1rem 1.5rem;
    border-top: 1px solid #1e1e1e;
    background: #0f0f0f;
  }

  input {
    flex: 1;
    padding: 0.7rem 1rem;
    background: #171717;
    border: 1px solid #272727;
    border-radius: 10px;
    color: #f0f0f0;
    font-size: 0.9rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus { border-color: #4f46e5; }
  input::placeholder { color: #3a3a3a; }

  .send-btn {
    width: 38px;
    height: 38px;
    background: #4f46e5;
    border: none;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .send-btn:hover { background: #4338ca; }

  .send-btn svg {
    width: 16px;
    height: 16px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>
<body>
<header>
  <button class="back-btn" onclick="window.location.href='/rooms.html'">←</button>
  <span class="room-title" id="roomTitle">Room</span>
</header>

<div id="messages"></div>

<div class="input-area">
  <input type="text" id="messageInput" placeholder="Send a message" />
  <button class="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<script src="chat.js"></script>
</body>
</html>
